<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>تجربة Pusher Vanilla JS</title>
    <script src="https://js.pusher.com/8.0.1/pusher.min.js"></script>
</head>
<body>

    <h2>غرفة دردشة بسيطة جداً</h2>
    <input type="text" id="messageInput" placeholder="اكتب رسالة هنا...">
    <button onclick="sendMessage()">إرسال</button>

    <h3>الرسائل المستلمة:</h3>
    <ul id="messagesList"></ul>

    <script>
        // 1. إعداد Pusher والاستماع للمستجدات
        const pusher = new Pusher('YOUR_KEY', { cluster: 'YOUR_CLUSTER' });
        const channel = pusher.subscribe('chat-room');

        // الاستماع لحدث وصول رسالة جديدة
        channel.bind('new-message', function(data) {
            const li = document.createElement('li');
            li.textContent = data.message;
            document.getElementById('messagesList').appendChild(li);
        });

        // 2. دالة إرسال الرسالة إلى الـ Serverless Function
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value;
            if (!text) return;

            // إرسال الـ POST request إلى الفانكشن على فيرسل
            await fetch('/api/message', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: text })
            });

            input.value = ''; // تفريغ الحقل
        }
    </script>
</body>
</html>
